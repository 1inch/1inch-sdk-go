name: PR validation

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.png'
      - .gitignore

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code into workspace directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Unit tests
        run: make test

      - name: Compile integration tests
        run: go vet -tags integration ./tests/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code into workspace directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=3m

  # Temporary probe for the maiden Fusion+ permit2 canary; reverted before merge.
  fusionplus-permit2-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code into workspace directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Place one Fusion+ permit2 canary order
        env:
          DEV_PORTAL_TOKEN: ${{ secrets.DEV_PORTAL_TOKEN }}
          CANARY_WALLET_KEY: ${{ secrets.CANARY_WALLET_KEY }}
          CANARY_BASE_RPC_URL: ${{ secrets.CANARY_BASE_RPC_URL }}
          CANARY_ARBITRUM_RPC_URL: ${{ secrets.CANARY_ARBITRUM_RPC_URL }}
          CANARY_FUSION_PLUS_PERMIT2: '1'
        run: go test -v -tags integration -timeout 30m -run TestProductionCanaryFusionPlusPermit2 ./tests/integration/
