name: PR validation

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.png'
      - .gitignore

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code into workspace directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Unit tests
        run: make test

      - name: Compile integration tests
        run: go vet -tags integration ./tests/...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code into workspace directory
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=3m
